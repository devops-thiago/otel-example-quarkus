name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write
  statuses: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up JDK 21
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Check code formatting (Spotless)
      run: mvn spotless:check -q

  test:
    runs-on: ubuntu-latest
    needs: [format]
    environment: dev

    strategy:
      matrix:
        java-version: [21]

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0  # Disable shallow clone for SonarCloud

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run tests
      run: mvn clean test

    - name: Publish test summary
      if: success() || failure()
      run: |
        python3 -c '
        import glob, os, xml.etree.ElementTree as ET
        t = f = e = s = 0
        for p in glob.glob("target/surefire-reports/TEST-*.xml"):
            r = ET.parse(p).getroot()
            t += int(r.get("tests", 0)); f += int(r.get("failures", 0)); e += int(r.get("errors", 0)); s += int(r.get("skipped", 0))
        with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as out:
            out.write(f"## Maven Tests\n\n- Tests: {t}\n- Failures: {f}\n- Errors: {e}\n- Skipped: {s}\n")
        '

    - name: Generate code coverage report
      run: mvn jacoco:report

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: devops-thiago/otel-example-quarkus

    - name: Check coverage thresholds
      run: mvn jacoco:check
      continue-on-error: true

    - name: Cache SonarCloud packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: SonarCloud Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=devops-thiago_otel-example-quarkus \
          -Dsonar.organization=devops-thiago \
          -Dsonar.host.url=https://sonarcloud.io
      if: ${{ env.SONAR_TOKEN != '' }}

    - name: Upload test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: always()
      with:
        name: test-results
        path: target/surefire-reports/

    - name: Upload coverage report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: always()
      with:
        name: coverage-report
        path: target/site/jacoco/

  build:
    needs: [format]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up JDK 21
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Upload build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: jar-artifacts
        path: target/*.jar

  docker:
    needs: [test, build]
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

    - name: Login to Docker Hub
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/otel-crud-api-quarkus:latest
          ${{ secrets.DOCKER_USERNAME }}/otel-crud-api-quarkus:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Update deployment status
      run: echo "Docker image built and pushed successfully"

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

    - name: Build Docker image for PR validation
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        push: false
        tags: otel-example-quarkus:pr-${{ github.event.pull_request.number }}
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Verify Docker image was built
      run: |
        echo "Listing Docker images:"
        docker images
        echo "Checking if our image exists:"
        docker inspect otel-example-quarkus:pr-${{ github.event.pull_request.number }}

  integration-test:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Start services with Docker Compose
      run: docker compose up -d

    - name: Wait for services to be ready
      run: |
        echo "Waiting for observability health check to complete..."
        timeout 600 bash -c '
          while true; do
            status=$(docker inspect --format="{{.State.Status}}" observability-health-check 2>/dev/null || echo "not_found")
            if [ "$status" = "exited" ]; then
              exit_code=$(docker inspect --format="{{.State.ExitCode}}" observability-health-check)
              if [ "$exit_code" = "0" ]; then
                echo "✅ Observability services health check passed!"
                break
              else
                echo "❌ Observability services health check failed with exit code $exit_code"
                docker logs observability-health-check
                exit 1
              fi
            elif [ "$status" = "running" ]; then
              echo "⏳ Health check in progress..."
              sleep 10
            else
              echo "⏳ Waiting for health check to start (status: $status)..."
              sleep 5
            fi
          done
        '

        echo "Waiting for application to start..."
        timeout 300 bash -c 'until curl -f http://localhost:8080/q/health; do sleep 5; done'

    - name: Run integration tests
      run: |
        # Test API endpoints
        curl -f http://localhost:8080/api/users
        curl -f http://localhost:8080/q/health

        # Test creating a user
        curl -X POST http://localhost:8080/api/users \
          -H "Content-Type: application/json" \
          -d '{"name": "Test User", "email": "test@example.com", "bio": "Integration test"}' \
          -f

    - name: Check observability stack
      run: |
        # Verify Grafana is running
        curl -f http://localhost:3000

        # Verify Alloy is running
        curl -f http://localhost:12345

        # Wait for metrics to flow through OTLP -> Alloy -> Mimir
        echo "Waiting for metrics in Mimir..."
        timeout 120 bash -c '
          until curl -sf http://localhost:9009/prometheus/api/v1/query \
            --data-urlencode "query=http_server_request_duration_count" \
            | grep -q "result" ; do
            sleep 10
          done
        '
        echo "✅ Metrics are flowing to Mimir via OTLP"

    - name: Debug on failure
      if: failure()
      run: |
        echo "=== Container Status ==="
        docker compose ps -a

        echo "=== Container Logs ==="
        echo "--- Tempo logs ---"
        docker logs tempo --tail 50 || true

        echo "--- Loki logs ---"
        docker logs loki --tail 50 || true

        echo "--- Mimir logs ---"
        docker logs mimir --tail 50 || true

        echo "--- MinIO logs ---"
        docker logs minio --tail 30 || true

        echo "=== Health Check Status ==="
        docker inspect --format='{{.State.Health}}' tempo || true
        docker inspect --format='{{.State.Health}}' loki || true
        docker inspect --format='{{.State.Health}}' mimir || true

    - name: Stop services
      if: always()
      run: docker compose down
